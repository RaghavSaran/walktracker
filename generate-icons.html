<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Open browser console and run the script below, then right-click each canvas and "Save image as" icon-192.png and icon-512.png</p>

<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, s, s);
  ctx.fillStyle = '#22c55e';
  ctx.beginPath();
  ctx.arc(s/2, s/2, s*0.38, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${s*0.22}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('W', s/2, s/2);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
